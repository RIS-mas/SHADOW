<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAWDOW COMMUNITY | Discord Server</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-layer layer-1"></div>
        <div class="bg-layer layer-2"></div>
        <div class="bg-layer layer-3"></div>
        <div class="bg-layer layer-4"></div>
    </div>

    <div class="container">
        <header class="server-logo">
            <div class="logo">
                <i class="fas fa-shadow"></i>
                <h1>SHAWDOW</h1>
                <span>COMMUNITY</span>
            </div>
        </header>

        <main class="content">
            <div class="welcome-text">
                <h2>Welcome to the Shadows</h2>
                <p>Join our elite Discord community where darkness meets excellence</p>
            </div>

            <div class="cta-buttons">
                <a href="server.html" class="btn btn-primary">
                    <i class="fab fa-discord"></i>
                    Server Info
                </a>
                <a href="https://discord.gg/trruCzkvnb" class="btn btn-secondary" target="_blank">
                    <i class="fas fa-link"></i>
                    Join SHAWDOW Now
                </a>
            </div>
        </main>
    </div>

    <script src="script.js"></script>

</html>
